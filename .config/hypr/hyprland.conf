# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Use defaults Omarchy defaults (but don't edit these directly!)
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

# Add any other personal Hyprland configuration below
unbind = , Tab
unbind = SUPER ALT SHIFT, B
bindd = SUPER ALT SHIFT, B, Browser, exec, librewolf
bindd = SUPER ALT, B, Browser, exec, librewolf

# Extra workspace additions
bindd = SUPER, KP_END, Switch to workspace 1, workspace, 1
bindd = SUPER, KP_DOWN, Switch to workspace 2, workspace, 2
bindd = SUPER, KP_NEXT, Switch to workspace 3, workspace, 3
bindd = SUPER, KP_LEFT, Switch to workspace 4, workspace, 4
bindd = SUPER, KP_BEGIN, Switch to workspace 5, workspace, 5
bindd = SUPER, KP_RIGHT, Switch to workspace 6, workspace, 6
bindd = SUPER, KP_HOME, Switch to workspace 7, workspace, 7
bindd = SUPER, KP_UP, Switch to workspace 8, workspace, 8
bindd = SUPER, KP_PRIOR, Switch to workspace 9, workspace, 9
bindd = SUPER, KP_INSERT, Switch to workspace 11, workspace, 11
bindd = SUPER SHIFT ALT, code:20, Switch to workspace 11, workspace, 11 # [-] (MINUS) key

# Move to workspace
bindd = SUPER SHIFT ALT, KP_INSERT, Move window silently to workspace 11, movetoworkspacesilent, 11
bindd = SUPER SHIFT, KP_INSERT, Move window to workspace 11, movetoworkspace, 11

# I don't believe these will work (WIP) (at least one of them is working)
bindd = SUPER, KP_DECIMAL, Switch to workspace 10, workspace, 10
bindd = SUPER, KP_DELETE, Switch to workspace 10, workspace, 10
bindd = SUPER SHIFT, KP_DECIMAL, Move window to workspace 10, movetoworkspace, 10
bindd = SUPER SHIFT, KP_DELETE, Move window to workspace 10, movetoworkspace, 10

# windowrule = workspace 5, match:class qemu

# From thread: https://www.reddit.com/r/hyprland/comments/1hfjw1h/wanna_move_cursor_with_numpad_aka_mouse_keymouse/
# #(src cGPT)
binde = , KP_HOME, exec, ydotool mousemove -- -18 -18 && sleep 0.00001   # Left-Up
binde = , KP_PRIOR, exec, ydotool mousemove -- 18 -18 && sleep 0.00001   # Right-Up
binde = , KP_END, exec, ydotool mousemove -- -18 18 && sleep 0.00001     # Left-Down
binde = , KP_NEXT, exec, ydotool mousemove -- 18 18 && sleep 0.00001     # Right-Down
binde = , KP_LEFT, exec, ydotool mousemove -- -18 0 && sleep 0.1  # Left
binde = , KP_RIGHT, exec, ydotool mousemove -- 18 0 && sleep 0.1  # Right
binde = , KP_UP, exec, ydotool mousemove -- 0 -18 && sleep 0.1  # Up
binde = , KP_DOWN, exec, ydotool mousemove -- 0 18 && sleep 0.1  # Down
binde = SHIFT, KP_DOWN, exec, ydotool mousemove -- 0 11 && sleep 0.00001  # Down (half speed with Shift)# binde = SHIFT, KP_LEFT, exec, ydotool mousemove -- -9 0 && sleep 0.1  # Left
binde = SHIFT, KP_RIGHT, exec, ydotool mousemove -- 11 0 && sleep 0.00001  # Right
binde = SHIFT, KP_UP, exec, ydotool mousemove -- 0 -11 && sleep 0.00001  # Up
binde = SHIFT, KP_LEFT, exec, ydotool mousemove -- -11 0 && sleep 0.00001  # Down
bind = , KP_BEGIN, exec, ydotool click C0
bind = , KP_DIVIDE, exec, ydotool click 0x40
bind = , KP_MULTIPLY, exec, ydotool click 0x42 0x82
bind = , KP_SUBTRACT, exec, ydotool click 0x41 0x81
# bind = , KP_INSERT, exec, sh -c 'if [ "$(cat /tmp/mouse_state)" = "40" ]; then echo "80" > /tmp/mouse_state && ydotool click 0x80; else echo "40" > /tmp/mouse_state && ydotool click 0x40; fi'
bind = , KP_Add, exec, ydotoold --socket-perm=0666 --socket-path=/run/user/1000/.ydotool_socket
bind = , KP_INSERT, sendshortcut,, 0,

# Alt as main modifier - restore default input
bind = ALT, KP_Enter, exec, pkill ydotoold # KP_Enter is reversed
binde = ALT, KP_END,  sendshortcut,, 1,
binde = ALT, KP_DOWN, sendshortcut,, 2,
binde = ALT, KP_NEXT, sendshortcut,, 3,
binde = ALT, KP_LEFT, sendshortcut,, 4,
binde = ALT, KP_BEGIN, sendshortcut,, 5,
binde = ALT, KP_RIGHT, sendshortcut,, 6,
binde = ALT, KP_HOME, sendshortcut,, 7,
binde = ALT, KP_UP, sendshortcut,, 8,
binde = ALT, KP_PRIOR, sendshortcut,, 9,
binde = ALT, KP_INSERT, sendshortcut,, 0,
binde = ALT, KP_DIVIDE, sendshortcut,, KP_DIVIDE,
binde = ALT, KP_MULTIPLY, sendshortcut,, KP_MULTIPLY,
binde = ALT, KP_SUBTRACT, sendshortcut,, KP_SUBTRACT,
binde = ALT, KP_Add, sendshortcut,, KP_ADD,
# these appear to not be working (WIP)
binde = ALT, KP_DECIMAL, sendshortcut,, "."
binde = ALT, KP_DELETE, sendshortcut,, "."
binde = , KP_DELETE, sendshortcut,, "."
# Reverse for KeyPad Enter only
binde = , KP_Enter, sendshortcut,, KP_ENTER,

# # Ignore
# # bind = ALT, KP_INSERT,  sh -c 'if [ "$(cat /tmp/mouse_state)" = "40" ]; then echo "80" > /tmp/mouse_state &&
# # bind = , KP_Add, exec, sudo ydotoold --socket-perm=0666 --socket-path=/run/user/1000/.ydotool_socket
unbind = , Tab
